<header class="topbar">
  <div class="topbar-content">
    <div class="topbar-left">
      <div class="d-flex align-items-center">
        <img src="../../../shared/components/images/logo1.PNG" alt="Logo Academia" class="logo me-3" height="40">
        <h5 class="mb-0 brand-title">ACADEMIA</h5>
      </div>
    </div>
    
    <div class="topbar-right">
      <!-- Solo mostrar si está logueado -->
      <div *ngIf="isLoggedIn" class="dropdown">
        <button class="btn btn-admin dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-2"></i>
          {{ getUserName() }}
          <small class="ms-2 opacity-75">({{ getUserRole() }})</small>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li>
            <a class="dropdown-item" routerLink="/admin/perfil">
              <i class="bi bi-person me-2"></i>Perfil
            </a>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li>
            <!-- Añadir preventDefault para evitar comportamiento por defecto del link -->
            <a class="dropdown-item text-danger" href="javascript:void(0)" (click)="logout(); $event.preventDefault()">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </a>
          </li>
        </ul>
      </div>
      
      <!-- Mostrar botón de login si no está logueado -->
      <div *ngIf="!isLoggedIn">
        <a class="btn btn-admin" routerLink="/login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
        </a>
      </div>
    </div>
  </div>
</header>
